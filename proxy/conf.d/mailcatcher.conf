server{
    server_name mailcatcher.vm1.test mailcatcher.vm2.test mailcatcher.vm3.test mailcatcher.vm4.test mailcatcher.vm5.test mailcatcher.vm6.test;
    listen 80;

    location / {

        proxy_pass http://mailcatcher:1080;

        proxy_connect_timeout 180s;
        proxy_send_timeout 180s;
        proxy_read_timeout 180s;
        send_timeout 180s;

        error_page 502 /502.html;
    }

    location = /502.html {
        internal;
        default_type text/html;
        charset utf-8;
        return 502 '<html><body><h1>Fut a Mailcatcher?</h1></body></html>';
    }
}
